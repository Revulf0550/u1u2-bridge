<svg width="100%" viewBox="0 0 1240 700" xmlns="http://www.w3.org/2000/svg">
<title>Тракт u2 — управление (Pi→ELRS→дрон) и видео (дрон→VRX→Pi)</title>
<desc>Выносной узел u2: цепь управления Pi GPIO p26 (UART_TX) → инвертор SN74HC14N → ELRS-TX → радиоканал → дрон; питание инвертора p1(3.3V)+крепёж, ELRS-TX p2(+5V)+p12(GND). Цепь видео: камера дрона → VTX → VRX → composite → USB видеограббер → Pi /dev/video0.</desc>
<defs>
<marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#4f8a1f"/></marker>
<marker id="av" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#6d4aa0"/></marker>
</defs>
<rect x="0" y="0" width="1240" height="700" fill="#f4f1e9"/>
<text x="40" y="34" font-family="Anthropic Sans,sans-serif" font-size="17" font-weight="600" fill="#181613">Тракт u2 — управление (Pi→ELRS→дрон) и видео (дрон→VRX→Pi)</text>
<text x="40" y="55" font-family="Anthropic Sans,sans-serif" font-size="12" fill="#6b6459">выносной узел у дрона · headless · сигнал управления и аналоговое видео</text>
<rect x="1124" y="22" width="92" height="24" rx="4" fill="#bf4317"/>
<text x="1170" y="38" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="12" font-weight="700" fill="#ffffff">U2</text>

<!-- lane labels -->
<rect x="40" y="92" width="150" height="20" rx="9" fill="#C0DD97"/>
<text x="115" y="106" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="11" font-weight="600" fill="#173404">УПРАВЛЕНИЕ →</text>
<rect x="40" y="392" width="150" height="20" rx="9" fill="#ECE3F7"/>
<text x="115" y="406" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="11" font-weight="600" fill="#4a3270">← ВИДЕО</text>

<!-- Pi u2 card -->
<rect x="40" y="120" width="200" height="470" rx="10" fill="#fbf9f3" stroke="#cdc4b4" stroke-width="1.2"/>
<text x="140" y="150" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="13" font-weight="600" fill="#181613">Orange Pi 5 Max</text>
<text x="140" y="168" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="11" fill="#6b6459">u2 · headless</text>
<!-- pin stubs -->
<circle cx="240" cy="200" r="6" fill="#4f8a1f" stroke="#fff"/><text x="228" y="204" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="10" font-weight="600" fill="#27500A">p26 · UART_TX</text>
<circle cx="240" cy="250" r="6" fill="#1d63b0" stroke="#fff"/><text x="228" y="254" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="10" font-weight="600" fill="#185FA5">p1 · 3.3V</text>
<circle cx="240" cy="300" r="6" fill="#bf4317" stroke="#fff"/><text x="228" y="304" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="10" font-weight="600" fill="#bf4317">p2 · +5V</text>
<circle cx="240" cy="350" r="6" fill="#2f2f2d" stroke="#fff"/><text x="228" y="354" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="10" font-weight="600" fill="#181613">p12 · GND</text>
<circle cx="240" cy="420" r="8" fill="none" stroke="#181613" stroke-width="2.5"/><text x="226" y="424" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="10" font-weight="600" fill="#181613">крепёж · GND</text>
<rect x="232" y="500" width="16" height="20" rx="2" fill="#6d4aa0"/><text x="226" y="514" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="10" font-weight="600" fill="#4a3270">USB 3.0 · /dev/video0</text>

<!-- Inverter chip -->
<rect x="340" y="165" width="150" height="120" rx="6" fill="#ece6d8" stroke="#888780" stroke-width="1"/>
<text x="415" y="195" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="12" font-weight="600" fill="#181613">SN74HC14N</text>
<text x="415" y="212" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="10" fill="#6b6459">инвертор · 1 канал</text>
<text x="415" y="248" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="#185FA5">VCC ← p1 (3.3V)</text>
<text x="415" y="263" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="#181613">GND → крепёж</text>
<text x="348" y="228" font-family="JetBrains Mono,monospace" font-size="9" fill="#27500A">1A</text>
<text x="482" y="228" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="9" fill="#27500A">1Y</text>

<!-- ELRS-TX -->
<rect x="560" y="160" width="175" height="130" rx="8" fill="#fbf9f3" stroke="#cdc4b4" stroke-width="1.2"/>
<text x="647" y="190" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="12" font-weight="600" fill="#181613">ELRS-TX модуль</text>
<text x="647" y="207" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="10" fill="#6b6459">RF-модуль ДУ</text>
<text x="568" y="232" font-family="JetBrains Mono,monospace" font-size="9" fill="#27500A">pin5 · сигнал</text>
<text x="647" y="258" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="#bf4317">VCC ← p2 (+5V)</text>
<text x="647" y="273" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="#181613">GND ← p12</text>

<!-- Drone -->
<rect x="1010" y="120" width="190" height="470" rx="10" fill="#fbf9f3" stroke="#cdc4b4" stroke-width="1.2"/>
<text x="1105" y="150" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="13" font-weight="600" fill="#181613">Дрон</text>
<!-- quad glyph -->
<g stroke="#6b6459" stroke-width="2" fill="none"><line x1="1075" y1="200" x2="1135" y2="260"/><line x1="1135" y1="200" x2="1075" y2="260"/></g>
<circle cx="1075" cy="200" r="11" fill="#ece6d8" stroke="#888780"/><circle cx="1135" cy="200" r="11" fill="#ece6d8" stroke="#888780"/>
<circle cx="1075" cy="260" r="11" fill="#ece6d8" stroke="#888780"/><circle cx="1135" cy="260" r="11" fill="#ece6d8" stroke="#888780"/>
<rect x="1090" y="215" width="30" height="30" rx="4" fill="#d2dae4" stroke="#3f4a5a"/>
<rect x="1035" y="300" width="140" height="44" rx="6" fill="#C0DD97" stroke="#4f8a1f" stroke-width="0.75"/>
<text x="1105" y="320" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="11" font-weight="500" fill="#173404">ELRS-приёмник</text>
<text x="1105" y="335" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="9" fill="#3B6D11">(управление)</text>
<rect x="1035" y="470" width="140" height="48" rx="6" fill="#ECE3F7" stroke="#8a6fc0" stroke-width="0.75"/>
<text x="1105" y="490" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="11" font-weight="500" fill="#4a3270">камера → VTX</text>
<text x="1105" y="505" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="9" fill="#6d4aa0">аналоговое видео</text>

<!-- VRX -->
<rect x="765" y="440" width="160" height="110" rx="8" fill="#fbf9f3" stroke="#cdc4b4" stroke-width="1.2"/>
<text x="845" y="478" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="12" font-weight="600" fill="#181613">VRX</text>
<text x="845" y="496" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="10" fill="#6b6459">приём аналог. видео</text>
<text x="845" y="520" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="#6d4aa0">composite out →</text>

<!-- Grabber -->
<rect x="500" y="440" width="180" height="110" rx="8" fill="#fbf9f3" stroke="#cdc4b4" stroke-width="1.2"/>
<text x="590" y="478" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="12" font-weight="600" fill="#181613">USB видеограббер</text>
<text x="590" y="496" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="10" fill="#6b6459">UVC · composite → USB</text>
<text x="590" y="520" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="#4a3270">→ /dev/video0</text>

<!-- CONTROL flow (green) -->
<path d="M246 200 L334 200" fill="none" stroke="#4f8a1f" stroke-width="2.5" marker-end="url(#ag)"/>
<text x="290" y="192" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="#27500A">CRSF</text>
<path d="M490 215 L555 215" fill="none" stroke="#4f8a1f" stroke-width="2.5" marker-end="url(#ag)"/>
<path d="M735 220 L800 220" fill="none" stroke="#4f8a1f" stroke-width="2.5"/>
<g stroke="#4f8a1f" stroke-width="2" fill="none"><path d="M806 206 q12 14 0 28"/><path d="M816 198 q20 22 0 44"/></g>
<g stroke="#4f8a1f" stroke-width="2" fill="none"><path d="M1004 206 q-12 14 0 28"/><path d="M994 198 q-20 22 0 44"/></g>
<path d="M826 220 L988 220" fill="none" stroke="#4f8a1f" stroke-width="2" stroke-dasharray="2 5"/>
<text x="907" y="212" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="10" fill="#27500A">радиоканал ДУ</text>
<path d="M935 250 L1030 305" fill="none" stroke="#4f8a1f" stroke-width="2" marker-end="url(#ag)"/>

<!-- power lines (thin) -->
<path d="M246 250 L300 250 L300 165" fill="none" stroke="#1d63b0" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="306" y="160" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#185FA5">VCC инвертора</text>
<path d="M246 300 L320 300 L320 140 L645 140 L645 158" fill="none" stroke="#bf4317" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="430" y="134" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#bf4317">+5V → ELRS-TX</text>
<path d="M246 350 L335 350 L335 318 L740 318 L740 290" fill="none" stroke="#2f2f2d" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="500" y="332" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#181613">GND → ELRS-TX (p12)</text>
<path d="M415 285 L415 320 L260 320 L260 412" fill="none" stroke="#181613" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="300" y="338" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#181613">GND инв. → крепёж</text>

<!-- VIDEO flow (violet, right->left) -->
<g stroke="#6d4aa0" stroke-width="2" fill="none"><path d="M1030 494 q-12 14 0 28"/><path d="M1020 486 q-20 22 0 44"/></g>
<g stroke="#6d4aa0" stroke-width="2" fill="none"><path d="M922 494 q12 14 0 28"/><path d="M932 486 q20 22 0 44"/></g>
<path d="M1018 508 L935 508" fill="none" stroke="#6d4aa0" stroke-width="2" stroke-dasharray="2 5"/>
<text x="977" y="500" text-anchor="middle" font-family="Anthropic Sans,sans-serif" font-size="10" fill="#4a3270">видео-радио</text>
<path d="M764 495 L685 495" fill="none" stroke="#6d4aa0" stroke-width="2.5" marker-end="url(#av)"/>
<text x="724" y="487" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="#4a3270">composite</text>
<path d="M499 495 L300 495 L300 521 L250 521" fill="none" stroke="#6d4aa0" stroke-width="2.5" marker-end="url(#av)"/>
<text x="400" y="487" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="#4a3270">USB (UVC)</text>

<!-- legend / notes -->
<rect x="40" y="612" width="1160" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.75"/>
<rect x="52" y="622" width="86" height="18" rx="9" fill="#7a5c00"/>
<text x="95" y="635" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" font-weight="600" letter-spacing="1" fill="#ffffff">ОПИСАНИЕ</text>
<text x="148" y="635" font-family="Anthropic Sans,sans-serif" font-size="11" font-weight="500" fill="#181613">Управление: p26 (UART_TX) → инвертор (VCC←p1, GND→крепёж) → ELRS-TX (VCC←p2 +5V, GND←p12) → радио → дрон.</text>
<text x="52" y="657" font-family="Anthropic Sans,sans-serif" font-size="11" fill="#181613">Видео: камера дрона → VTX → VRX → composite → USB видеограббер → Pi /dev/video0. Все земли общие.</text>
</svg>
