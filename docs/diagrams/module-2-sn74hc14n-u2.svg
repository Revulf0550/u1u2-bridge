<text x="265" y="322" text-anchor="end" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#444441">↓ GND</text>
<rect x="412" y="156" width="46" height="14" fill="#f4f1e9"/>
<text x="415" y="166" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#444441">GND ↓</text>
<rect x="412" y="260" width="46" height="14" fill="#f4f1e9"/>
<text x="415" y="270" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#444441">GND ↓</text>
