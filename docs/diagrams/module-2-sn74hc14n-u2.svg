<text x="340" y="292" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#6b6459">Schmitt</text>
<text x="340" y="306" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#6b6459">inverter</text>

