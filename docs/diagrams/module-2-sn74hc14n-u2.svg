<text x="125" y="124" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="12" fill="#27500A">от OPi pin 26 · зелёный</text>

<rect x="30" y="142" width="190" height="44" rx="8" fill="#ffffff" stroke="#181613" stroke-width="1"/>
<text x="125" y="160" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="14" font-weight="500" fill="#181613">Pin 2 · OUTPUT</text>
<text x="125" y="176" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="12" fill="#6b6459">к ELRS-модулю (TX) pin 5 · белый</text>

<rect x="460" y="90" width="190" height="44" rx="8" fill="#B5D4F4" stroke="#1d63b0" stroke-width="1"/>
