<text x="340" y="675" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#2C2C2A">breadboard GND-рейл · чёрный</text>
<text x="340" y="693" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="11" font-weight="500" fill="#181613">→ на плату Orange Pi u2, не на пин</text>
</g>

<rect x="40" y="762" width="600" height="64" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.75"/>
<rect x="52" y="770" width="86" height="18" rx="9" fill="#7a5c00"/>
<text x="95" y="783" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" letter-spacing="1" fill="#ffffff">ОПИСАНИЕ</text>
<text x="148" y="783" font-family="Anthropic Sans, sans-serif" font-size="12" font-weight="500" fill="#181613">SN74HC14N (u2) — что это и зачем:</text>
<text x="52" y="803" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#181613">Второй экземпляр инвертора (как в Модуле 2 u1), на стороне Orange Pi u2.</text>
<text x="52" y="819" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#181613">Питание и земля — напрямую с GPIO Pi u2 (pin 1 = 3V3, pin 6 = GND), без CH340G.</text>

<rect x="40" y="834" width="600" height="64" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.75"/>
<rect x="52" y="842" width="94" height="18" rx="9" fill="#7a5c00"/>
<text x="99" y="855" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" letter-spacing="1" fill="#ffffff">ПОЯСНЕНИЕ</text>
<text x="156" y="855" font-family="Anthropic Sans, sans-serif" font-size="12" font-weight="500" fill="#181613">Инвертор u2 — что куда:</text>
<text x="52" y="875" font-family="Anthropic Sans, sans-serif" font-size="11"><tspan fill="#27500A">pin 1 IN ← OPi u2 pin 26 (зел.)</tspan><tspan fill="#6b6459">   ·   </tspan><tspan fill="#181613">pin 2 OUT → ELRS-модуль (TX) pin 5 (бел.)</tspan></text>
<text x="52" y="891" font-family="Anthropic Sans, sans-serif" font-size="11"><tspan fill="#185FA5">pin 14 VCC ← OPi u2 pin 1 (син.)</tspan><tspan fill="#6b6459">   ·   </tspan><tspan fill="#181613">GND-шина → плата Orange Pi u2 (не на пин)</tspan></text>
</svg>
