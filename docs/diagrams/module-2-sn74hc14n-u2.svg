<svg width="100%" viewBox="0 0 680 906" xmlns="http://www.w3.org/2000/svg">
<title>Модуль 2 — SN74HC14N инвертор стороны u2</title>
<desc>Второй экземпляр SN74HC14N на стороне u2. Питание и земля напрямую с GPIO Orange Pi u2: VCC pin 14 от OPi pin 1, общая GND на плату Orange Pi u2 (не на пин). Вход pin 1 от OPi pin 26 (зелёный), выход pin 2 к ELRS-модулю (TX) pin 5 («белый»). Pins 3,5,7,9,11,13 — GND-шина.</desc>

<rect x="0" y="0" width="680" height="906" fill="#f4f1e9"/>

<text x="340" y="34" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="15" font-weight="500" fill="#181613">Модуль 2 — SN74HC14N инвертор стороны u2</text>
<text x="340" y="54" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="12" fill="#6b6459">вертикальный DIP-14 · питание и земля от Orange Pi u2</text>
<rect x="514" y="22" width="146" height="22" rx="4" fill="#bf4317"/>
<text x="587" y="37" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#ffffff">→ Orange Pi u2</text>

