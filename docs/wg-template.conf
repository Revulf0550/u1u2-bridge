# WireGuard клиентский конфиг — шаблон для Pi-пиров u1u2-bridge.
#
# Путь на Pi:  /etc/wireguard/wg0.conf   (chmod 600, owner root:root)
#
# Это REFERENCE-файл. Реальный wg0.conf генерируется wg-easy на VPS
# (admin UI: http://95.140.147.108:51821) и скачивается per-peer.
#
# После скачивания из wg-easy ОБЯЗАТЕЛЬНО править руками два поля до
# установки на Pi — wg-easy шлёт небезопасные для нашей схемы дефолты.
# См. `CLAUDE.md` → раздел "Lessons & Incidents", уроки 2026-05-18 про
# wg-easy (Pi-клиент и Windows-клиент — два разных инцидента, одна
# причина: дефолты wg-easy).
#
#   1. AllowedIPs: wg-easy дефолт "0.0.0.0/0, ::/0".
#      Это отправляет ВЕСЬ трафик Pi в туннель — ломает LAN
#      192.168.1.0/24 и связь через CPE710. Заменить на VPN-подсеть:
#          AllowedIPs = 10.8.0.0/24
#
#   2. PersistentKeepalive: wg-easy дефолт "0" (выключено).
#      NAT-state по пути протухает за 60–180 с, туннель тихо перестаёт
#      работать без явной ошибки. Поставить 15 секунд:
#          PersistentKeepalive = 15
#
# Обе правки обязательны для Pi-пиров. Windows-пир (NSU-pc) —
# ОТДЕЛЬНЫЙ случай: у него сознательно `AllowedIPs = 0.0.0.0/0`
# (full tunnel). Это не противоречит правилу выше — правило говорит
# "не оставляй wg-easy дефолты случайно", а full-tunnel на NSU-pc —
# явное проектное решение, а не недосмотр.
#
# Адресация VPN-подсети 10.8.0.0/24:
#   10.8.0.1  wg-easy server (VPS NL)
#   10.8.0.5  NSU-pc (Windows, full-tunnel — отдельный конфиг, не этот шаблон)
#   10.8.0.6  u1-pi (мастер-пульт)
#   10.8.0.7  u2-pi (выносная база)
#
# Секреты в файле — ПЛЕЙСХОЛДЕРЫ. Никогда не коммитить реальные ключи,
# никогда не вставлять реальные приватники в чаты, баг-трекеры и логи.


[Interface]
# Приватник пира — sensitive. chmod 600, не коммитить, не вставлять в чаты.
PrivateKey = <REPLACE_WITH_PEER_PRIVATE_KEY>
# Адрес пира в VPN-подсети. /24, не /32 (wg-easy дефолт — оставляем).
#   u1-pi → 10.8.0.6/24
#   u2-pi → 10.8.0.7/24
Address = <REPLACE_WITH_PEER_VPN_IP>/24

[Peer]
# Серверный pubkey wg-easy — публичный, одинаковый для всех Pi-пиров.
# Посмотреть с любой подключённой Pi:  sudo wg show wg0
PublicKey = <REPLACE_WITH_SERVER_PUBLIC_KEY>
# Per-peer PSK. wg-easy генерит и вкладывает его в скачанный conf.
# Sensitive — обращаться как с приватным ключом.
PresharedKey = <REPLACE_WITH_PEER_PSK>
# Endpoint wg-easy сервера на VPS NL.
Endpoint = 95.140.147.108:51820
# КРИТИЧНО: только VPN-подсеть. НИКОГДА "0.0.0.0/0, ::/0" для Pi-пира.
AllowedIPs = 10.8.0.0/24
# КРИТИЧНО: 15 секунд. НИКОГДА "0".
PersistentKeepalive = 15
