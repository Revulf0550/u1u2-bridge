<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
<title>Модуль 3 — CH340G USB-UART</title>
<desc>3V3 синий к pin 14 VCC инвертора, RXD оранжевый «белый» от pin 2 OUTPUT инвертора, GND чёрный к общей шине, TXD не подключаем (simplex single-wire).</desc>

<rect x="0" y="0" width="680" height="580" fill="#1a1a18"/>

<text x="340" y="30" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="16" font-weight="500" fill="#F1EFE8">Модуль 3 — CH340G (USB-UART)</text>
<text x="340" y="50" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="12" fill="#B4B2A9">USB-A слева к Pi · пин-хедер справа к инвертору</text>

<rect x="140" y="180" width="320" height="200" rx="6" fill="#2C2C2A" stroke="#888780" stroke-width="0.5"/>
<text x="300" y="290" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="500" fill="#F1EFE8">CH340G</text>
<text x="300" y="306" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#B4B2A9">USB to UART TTL</text>

<rect x="70" y="245" width="74" height="50" rx="2" fill="#5F5E5A" stroke="#444441" stroke-width="0.5"/>
<rect x="80" y="255" width="56" height="14" fill="#1A1A18"/>
<rect x="80" y="273" width="56" height="14" fill="#1A1A18"/>
<text x="107" y="318" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#B4B2A9">USB-A → u1-pi</text>

<rect x="200" y="350" width="40" height="18" rx="2" fill="#854F0B" stroke="#EF9F27" stroke-width="0.5"/>
<text x="220" y="362" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#FAC775">S1</text>
<text x="220" y="384" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="10" fill="#B4B2A9">jumper → 3V3</text>

<rect x="290" y="350" width="80" height="18" rx="2" fill="#444441" stroke="#888780" stroke-width="0.5"/>
<text x="330" y="362" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#D3D1C7">TX-RX loop</text>
<text x="330" y="384" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="10" fill="#B4B2A9">снят</text>

<rect x="453" y="200" width="14" height="14" fill="#5F5E5A"/>
<text x="447" y="211" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#B4B2A9">5V</text>

<rect x="453" y="235" width="14" height="14" fill="#B4B2A9"/>
<text x="447" y="246" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" fill="#F1EFE8">3V3</text>

<rect x="453" y="270" width="14" height="14" fill="#5F5E5A"/>
<text x="447" y="281" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#B4B2A9">TXD</text>

<rect x="453" y="305" width="14" height="14" fill="#B4B2A9"/>
<text x="447" y="316" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" fill="#F1EFE8">RXD</text>

<rect x="453" y="340" width="14" height="14" fill="#B4B2A9"/>
<text x="447" y="351" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" fill="#F1EFE8">GND</text>

<line x1="467" y1="207" x2="500" y2="207" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="3 3"/>
<rect x="500" y="190" width="160" height="34" rx="6" fill="#2C2C2A" stroke="#888780" stroke-width="0.5"/>
<text x="510" y="207" font-family="Anthropic Sans, sans-serif" font-size="12" font-weight="500" fill="#D3D1C7">5V · не подключаем</text>
<text x="510" y="220" font-family="Anthropic Sans, sans-serif" font-size="10" fill="#B4B2A9">используем 3V3 ниже</text>

<line x1="467" y1="242" x2="500" y2="242" stroke="#378ADD" stroke-width="3"/>
<rect x="500" y="225" width="160" height="34" rx="6" fill="#0C447C" stroke="#85B7EB" stroke-width="0.5"/>
<text x="510" y="242" font-family="Anthropic Sans, sans-serif" font-size="12" font-weight="600" fill="#B5D4F4">3V3 · синий</text>
<text x="510" y="255" font-family="Anthropic Sans, sans-serif" font-size="10" fill="#85B7EB">к pin 14 VCC инвертора</text>

<line x1="467" y1="277" x2="500" y2="277" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="3 3"/>
<rect x="500" y="260" width="160" height="34" rx="6" fill="#2C2C2A" stroke="#888780" stroke-width="0.5" stroke-dasharray="2 2"/>
<text x="510" y="277" font-family="Anthropic Sans, sans-serif" font-size="12" font-weight="500" fill="#D3D1C7">TXD · НЕ подключаем</text>
<text x="510" y="290" font-family="Anthropic Sans, sans-serif" font-size="10" fill="#B4B2A9">simplex · single-wire</text>

<line x1="467" y1="312" x2="500" y2="312" stroke="#D85A30" stroke-width="3"/>
<rect x="500" y="295" width="160" height="34" rx="6" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
<text x="510" y="312" font-family="Anthropic Sans, sans-serif" font-size="12" font-weight="600" fill="#F5C4B3">RXD · белый</text>
<text x="510" y="325" font-family="Anthropic Sans, sans-serif" font-size="10" fill="#F0997B">от pin 2 OUTPUT инвертора</text>

<line x1="467" y1="347" x2="500" y2="347" stroke="#888780" stroke-width="3"/>
<rect x="500" y="330" width="160" height="34" rx="6" fill="#444441" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="510" y="347" font-family="Anthropic Sans, sans-serif" font-size="12" font-weight="600" fill="#D3D1C7">GND · чёрный</text>
<text x="510" y="360" font-family="Anthropic Sans, sans-serif" font-size="10" fill="#B4B2A9">к общей GND-шине</text>

<rect x="20" y="430" width="640" height="130" rx="8" fill="#412402" stroke="#BA7517" stroke-width="0.5"/>
<text x="340" y="455" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="13" font-weight="600" fill="#FAC775">Перед подключением проверить на плате CH340G</text>

<line x1="40" y1="467" x2="640" y2="467" stroke="#BA7517" stroke-width="0.3" opacity="0.5"/>

<circle cx="50" cy="487" r="3" fill="#97C459"/>
<text x="62" y="491" font-family="Anthropic Sans, sans-serif" font-size="12" font-weight="500" fill="#FAC775">S1 jumper</text>
<text x="62" y="507" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#EF9F27">между 5V и 3V3 ставится на положение 3V3</text>
<text x="62" y="522" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#EF9F27">(иначе на TXD/RXD будет 5V — спалит вход инвертора)</text>

<circle cx="350" cy="487" r="3" fill="#97C459"/>
<text x="362" y="491" font-family="Anthropic Sans, sans-serif" font-size="12" font-weight="500" fill="#FAC775">TX-RX loopback jumper</text>
<text x="362" y="507" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#EF9F27">снят с заводской позиции</text>
<text x="362" y="522" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#EF9F27">(иначе UART зацикливается на сам себя)</text>

<text x="340" y="548" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#FAC775" font-style="italic">оба пункта на твоей плате уже выполнены ✓</text>
</svg>
