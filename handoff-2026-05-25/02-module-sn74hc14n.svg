<title>Модуль 2 — SN74HC14N инвертор</title>
<desc>Вертикальный DIP-14. Pin 1 INPUT зелёный от Boxer S.PORT. Pin 2 OUTPUT оранжевый «белый» к CH340G RXD. Pin 14 VCC синий от CH340G 3V3. Pins 7, 3, 5, 9, 11, 13 — GND-шина, объединены одной перемычкой.</desc>

