<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
<title>Модуль 1 — Boxer JR-bay (источник CRSF)</title>
<desc>Pin 5 S.PORT — зелёный провод к 1A инвертора. Pin 4 GND — чёрный провод к общей шине. Pin 3 VBAT 7.8 В опасен. Pins 1, 2 не подключаем.</desc>

<rect x="0" y="0" width="680" height="500" fill="#1a1a18"/>

<text x="340" y="30" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="16" font-weight="500" fill="#F1EFE8">Модуль 1 — Boxer JR-bay (источник CRSF)</text>
<text x="340" y="50" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="12" fill="#B4B2A9">вид сверху · сторона антенны вверху</text>

<rect x="280" y="80" width="120" height="380" rx="8" fill="#2C2C2A" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="105" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#B4B2A9">JR-bay</text>

<line x1="290" y1="125" x2="390" y2="125" stroke="#5F5E5A" stroke-width="0.3" stroke-dasharray="2 2"/>
<text x="340" y="138" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="10" fill="#888780">сторона антенны</text>

<rect x="332" y="155" width="16" height="14" fill="#5F5E5A"/>
<text x="340" y="166" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="9" font-weight="500" fill="#B4B2A9">1</text>

<rect x="332" y="215" width="16" height="14" fill="#5F5E5A"/>
<text x="340" y="226" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="9" font-weight="500" fill="#B4B2A9">2</text>

<rect x="332" y="275" width="16" height="14" fill="#791F1F"/>
<text x="340" y="286" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="9" font-weight="500" fill="#F7C1C1">3</text>

<rect x="332" y="335" width="16" height="14" fill="#B4B2A9"/>
<text x="340" y="346" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="9" font-weight="500" fill="#2C2C2A">4</text>

<rect x="332" y="395" width="16" height="14" fill="#B4B2A9"/>
<text x="340" y="406" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="9" font-weight="500" fill="#2C2C2A">5</text>

<line x1="290" y1="435" x2="390" y2="435" stroke="#5F5E5A" stroke-width="0.3" stroke-dasharray="2 2"/>
<text x="340" y="450" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="10" fill="#888780">низ пульта</text>

<line x1="332" y1="162" x2="270" y2="162" stroke="#5F5E5A" stroke-width="2"/>
<rect x="40" y="142" width="230" height="40" rx="6" fill="#2C2C2A" stroke="#888780" stroke-width="0.5"/>
<text x="155" y="160" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="13" font-weight="500" fill="#D3D1C7">Pin 1 · PPM</text>
<text x="155" y="175" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#B4B2A9">не подключаем</text>

<line x1="332" y1="222" x2="270" y2="222" stroke="#5F5E5A" stroke-width="2"/>
<rect x="40" y="202" width="230" height="40" rx="6" fill="#2C2C2A" stroke="#888780" stroke-width="0.5"/>
<text x="155" y="220" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="13" font-weight="500" fill="#D3D1C7">Pin 2 · +6V regulated</text>
<text x="155" y="235" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#B4B2A9">не подключаем (не разведён)</text>

<line x1="332" y1="282" x2="270" y2="282" stroke="#A32D2D" stroke-width="2"/>
<rect x="40" y="262" width="230" height="40" rx="6" fill="#791F1F" stroke="#F09595" stroke-width="0.5"/>
<text x="155" y="280" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="13" font-weight="500" fill="#F7C1C1">Pin 3 · VBAT 7.8 В</text>
<text x="155" y="295" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#F09595">⚠ НЕ ТРОГАТЬ · сожжёт UART</text>

<line x1="332" y1="342" x2="270" y2="342" stroke="#888780" stroke-width="3"/>
<rect x="40" y="322" width="230" height="40" rx="6" fill="#444441" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="155" y="340" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="13" font-weight="500" fill="#F1EFE8">Pin 4 · GND</text>
<text x="155" y="355" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#D3D1C7">чёрный · общая GND-шина</text>

<line x1="332" y1="402" x2="270" y2="402" stroke="#639922" stroke-width="3"/>
<rect x="40" y="382" width="230" height="40" rx="6" fill="#27500A" stroke="#97C459" stroke-width="0.5"/>
<text x="155" y="400" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="13" font-weight="500" fill="#C0DD97">Pin 5 · S.PORT</text>
<text x="155" y="415" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#97C459">зелёный · к pin 1 (1A) инвертора</text>

<rect x="410" y="142" width="240" height="290" rx="8" fill="#2C2C2A" stroke="#444441" stroke-width="0.5"/>
<text x="530" y="167" text-anchor="middle" font-family="Anthropic Sans, sans-serif" font-size="13" font-weight="500" fill="#F1EFE8">Откуда сигнал</text>

<text x="425" y="195" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#B4B2A9">EdgeTX на Boxer:</text>
<text x="425" y="215" font-family="JetBrains Mono, monospace" font-size="11" fill="#D3D1C7">Internal RF = OFF</text>
<text x="425" y="231" font-family="JetBrains Mono, monospace" font-size="11" fill="#D3D1C7">External RF = CRSF</text>
<text x="425" y="247" font-family="JetBrains Mono, monospace" font-size="11" fill="#D3D1C7">Baudrate = 400 000</text>

<line x1="425" y1="268" x2="635" y2="268" stroke="#444441" stroke-width="0.5"/>

<text x="425" y="290" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#B4B2A9">Сигнал на S.PORT pin —</text>
<text x="425" y="306" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#B4B2A9">single-wire half-duplex,</text>
<text x="425" y="322" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#B4B2A9">инвертированный CRSF,</text>
<text x="425" y="338" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#B4B2A9">с частотой 250 Гц</text>

<line x1="425" y1="358" x2="635" y2="358" stroke="#444441" stroke-width="0.5"/>

<text x="425" y="380" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#B4B2A9">Режим simplex —</text>
<text x="425" y="396" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#B4B2A9">только TX в Pi.</text>
<text x="425" y="412" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#B4B2A9">Телеметрия отключена</text>
<text x="425" y="428" font-family="Anthropic Sans, sans-serif" font-size="11" fill="#B4B2A9">(оператор видит OSD).</text>
</svg>
